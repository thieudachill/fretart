<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Paper-grain tile, code-drawn (gen model blocked texture prompts 3x — see NOTES.md).
       Seamless by construction: stitchTiles keeps the turbulence periodic. -->
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.64  0 0 0 0 0.61  0 0 0 0 0.54  0 0 0 0.05 0"/>
    </filter>
    <filter id="flecks" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="1" seed="7" stitchTiles="stitch" result="f"/>
      <feColorMatrix in="f" type="matrix" values="0 0 0 0 0.64  0 0 0 0 0.55  0 0 0 0 0.42  0 0 0 0.03 0"/>
    </filter>
  </defs>
  <rect width="512" height="512" fill="#efe9dc"/>
  <rect width="512" height="512" filter="url(#grain)"/>
  <rect width="512" height="512" filter="url(#flecks)"/>
</svg>
