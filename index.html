<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FretArt — finger-driven visuals</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0e;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }
      #stage {
        position: fixed;
        inset: 0;
      }
      #stage canvas.render {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      #overlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      #hud {
        position: fixed;
        left: 12px;
        bottom: 10px;
        color: #9a9aa8;
        font-size: 11px;
        letter-spacing: 0.06em;
        pointer-events: none;
        user-select: none;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
      }
      #rec-indicator {
        position: fixed;
        top: 14px;
        left: 14px;
        display: none;
        align-items: center;
        gap: 7px;
        color: #ff4b5c;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.1em;
        pointer-events: none;
      }
      #rec-indicator.on { display: flex; }
      #rec-indicator .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #ff4b5c;
        animation: blink 1.2s infinite;
      }
      @keyframes blink { 50% { opacity: 0.25; } }
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        color: #d8d4c8;
        background: #0a0a0e;
        z-index: 20;
        transition: opacity 0.5s;
      }
      #splash h1 {
        font-size: 28px;
        font-weight: 300;
        letter-spacing: 0.35em;
        margin: 0;
      }
      #splash p { font-size: 12px; color: #77778a; letter-spacing: 0.1em; }
      #splash.hidden { opacity: 0; pointer-events: none; }
      .tp-dfwv { z-index: 30; } /* keep tweakpane above everything */
    </style>
  </head>
  <body>
    <div id="stage"></div>
    <canvas id="overlay"></canvas>
    <div id="hud"></div>
    <div id="rec-indicator"><span class="dot"></span>REC <span id="rec-time">0:00</span></div>
    <div id="splash">
      <h1>FRETART</h1>
      <p id="splash-status">loading hand tracker…</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
